<header>
    <div class="nav-container">
        <!-- Logo -->
        <a href="index.html" class="logo">

            <span class="logo-text">MindCare</span>
        </a>

        <!-- Desktop Navigation Menu -->
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>

            <!-- These elements swap depending on login status (handled in main.js/auth.js) -->
            <script>
                const user = JSON.parse(localStorage.getItem('mindcare_user'));
                if (user) {
                    document.write(`
                        <span style="font-size: 0.9rem; font-weight:600; color: var(--text-secondary);">Hi, <span class="user-profile-name">${user.name}</span></span>
                        <a href="dashboard.html" class="btn btn-secondary btn-sm" style="padding: 0.5rem 1.25rem;">Dashboard</a>
                        <a href="#" class="btn btn-primary btn-sm logout-btn" style="padding: 0.5rem 1.25rem;">Sign Out</a>
                    `);
                } else {
                    document.write(`
                        <a href="login.html" class="nav-link">Login</a>
                        <a href="signup.html" class="btn btn-primary btn-sm" style="padding: 0.5rem 1.25rem;">Get Started</a>
                    `);
                }
